<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRINK 앱 다운로드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 14px;
      color: #888;
      margin-bottom: 48px;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      color: #0a0a0a;
      text-decoration: none;
      padding: 16px 28px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      width: 240px;
      margin-bottom: 12px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn svg { flex-shrink: 0; }
    .btn-sub {
      font-size: 11px;
      font-weight: 400;
      color: #555;
      display: block;
    }
    .btn-text { display: flex; flex-direction: column; }
  </style>
  <script>
    (function() {
      var ua = navigator.userAgent;
      if (/iPhone|iPad|iPod/i.test(ua)) {
        window.location.replace('https://apps.apple.com/kr/app/%EB%B8%8C%EB%A7%81%ED%81%AC-vrink/id6759699641');
      } else if (/Android/i.test(ua)) {
        window.location.replace('https://play.google.com/store/apps/details?id=com.virnk.userapp');
      }
    })();
  </script>
</head>
<body>
  <div class="logo">VRINK</div>
  <div class="tagline">스마트 음료 자판기</div>

  <a href="https://apps.apple.com/kr/app/%EB%B8%8C%EB%A7%81%ED%81%AC-vrink/id6759699641" class="btn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
      <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
    </svg>
    <span class="btn-text">
      <span class="btn-sub">Download on the</span>
      App Store
    </span>
  </a>

  <a href="https://play.google.com/store/apps/details?id=com.virnk.userapp" class="btn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3.18 23.76c.3.17.65.19.97.07l12.57-7.25-2.83-2.83-10.71 10zM.54 1.38C.2 1.71 0 2.23 0 2.9v18.2c0 .67.2 1.19.55 1.52l.08.07 10.2-10.2v-.24L.62 1.31l-.08.07zM21.26 10.4l-2.95-1.7-3.17 3.17 3.17 3.18 2.98-1.72c.85-.49.85-1.29-.03-1.93zM3.18.24L15.75 7.5l-2.83 2.83L2.21.33C2.53.21 2.88.23 3.18.4z"/>
    </svg>
    <span class="btn-text">
      <span class="btn-sub">Get it on</span>
      Google Play
    </span>
  </a>
</body>
</html>
